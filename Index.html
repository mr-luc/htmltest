<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine GitHub Seite</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }
    header {
      padding: 60px 20px;
    }
    h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2em;
    }
    .box {
      background: rgba(255,255,255,0.1);
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      max-width: 500px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }
    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #ffcc00;
      color: black;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #ffaa00;
    }
  </style>
</head>
<body>

<header>
  <h1>🚀 Meine Website</h1>
  <p>Gehostet mit GitHub Pages</p>
</header>

<div class="box">
  <h2>Über mich</h2>
  <p>Hier kannst du später Infos eintragen.</p>
</div>

<div class="box">
  <h2>Mein erstes Projekt</h2>
  <p>Hier kommen deine Inhalte rein.</p>
  <button onclick="alert('Funktioniert! 😎')">Klick mich</button>
</div>

</body>
</html>
